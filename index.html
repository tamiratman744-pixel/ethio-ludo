<!DOCTYPE html>
<html>
<head>
<title>Ethio Ludo</title>
<style>
body{
    text-align:center;
    font-family:Arial;
}
button{
    padding:10px;
    font-size:20px;
}
</style>
</head>
<body>

<h1>Ethio Ludo</h1>

<h2 id="dice">0</h2>

<button onclick="rollDice()">🎲 Roll Dice</button>

<script>
function rollDice(){
    let n = Math.floor(Math.random()*6)+1;
    document.getElementById("dice").innerHTML = n;
}
</script>

</body>
</html>
